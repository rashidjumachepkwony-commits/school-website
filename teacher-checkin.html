<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Check-in/out - Changara Star Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f5f5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header .icon {
            font-size: 64px;
            display: block;
        }
        .header h1 {
            color: #001f5c;
            font-size: 28px;
            margin-top: 10px;
        }
        .header p {
            color: #666;
            margin-top: 5px;
        }
        .day-info {
            text-align: center;
            color: #666;
            margin: 5px 0 15px;
            font-size: 14px;
        }
        .weekend-message {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ffeaa7;
            margin: 10px 0;
            display: none;
        }
        .weekend-message .icon {
            font-size: 48px;
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            border-color: #0b5394;
            outline: none;
        }
        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .btn-row button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-row button:hover {
            transform: scale(1.02);
        }
        .btn-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-checkin {
            background: #28a745;
            color: white;
        }
        .btn-checkin:hover:not(:disabled) {
            background: #1e7e34;
        }
        .btn-checkout {
            background: #dc3545;
            color: white;
        }
        .btn-checkout:hover:not(:disabled) {
            background: #c82333;
        }
        .btn-checkin:disabled, .btn-checkout:disabled {
            background: #ccc;
            color: #666;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }
        .alert.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .status-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid #e0e0e0;
            display: none;
        }
        .status-card .status-text {
            font-size: 18px;
            font-weight: bold;
        }
        .status-card .status-text.checked-in {
            color: #28a745;
        }
        .status-card .status-text.checked-out {
            color: #dc3545;
        }
        .status-card .status-text.late {
            color: #ffc107;
        }
        .buttons-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .buttons-row button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 100px;
        }
        .btn-home {
            background: #6c757d;
            color: white;
        }
        .btn-home:hover {
            background: #5a6268;
        }
        .btn-admin {
            background: #0b5394;
            color: white;
        }
        .btn-admin:hover {
            background: #001f5c;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">👨‍🏫</span>
            <h1>Staff Check-in / Check-out</h1>
            <p>Changara Star Academy</p>
        </div>

        <div id="dayInfo" class="day-info"></div>
        <div id="weekendMessage" class="weekend-message">
            <span class="icon">📅</span>
            <h3>Weekend</h3>
            <p>Check-in/out is only available on weekdays<br>(Monday - Friday)</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="statusCard" class="status-card">
            <div id="statusText" class="status-text"></div>
            <div id="statusTime" style="margin-top:5px;color:#666;"></div>
            <div id="statusHours" style="color:#666;"></div>
        </div>

        <form id="checkinForm">
            <div class="form-group">
                <label>Staff ID</label>
                <input type="text" id="employeeId" placeholder="Enter your Staff ID" required autofocus>
            </div>
            <div class="form-group">
                <label>PIN</label>
                <input type="password" id="pin" placeholder="Enter your PIN" required>
            </div>
            
            <div class="btn-row">
                <button type="button" id="checkinBtn" class="btn-checkin" onclick="handleAction('checkin')">✅ Check In</button>
                <button type="button" id="checkoutBtn" class="btn-checkout" onclick="handleAction('checkout')">🚪 Check Out</button>
            </div>
        </form>

        <div class="buttons-row">
            <button onclick="window.location.href='index.html'" class="btn-home">🏠 Home</button>
            <button onclick="window.location.href='admin-login.html'" class="btn-admin">🔐 Admin</button>
        </div>
    </div>

    <script>
        // ============================================
        // DOM ELEMENTS
        // ============================================
        const employeeIdInput = document.getElementById('employeeId');
        const pinInput = document.getElementById('pin');
        const checkinBtn = document.getElementById('checkinBtn');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const alertDiv = document.getElementById('alert');
        const statusCard = document.getElementById('statusCard');
        const statusText = document.getElementById('statusText');
        const statusTime = document.getElementById('statusTime');
        const statusHours = document.getElementById('statusHours');
        const dayInfo = document.getElementById('dayInfo');
        const weekendMessage = document.getElementById('weekendMessage');

        // ============================================
        // CHECK DAY
        // ============================================
        function getDayInfo() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            
            return {
                dayName: days[dayOfWeek],
                isWeekend: isWeekend,
                date: today.toDateString()
            };
        }

        // ============================================
        // SHOW ALERT
        // ============================================
        function showAlert(message, type) {
            alertDiv.className = 'alert ' + type;
            alertDiv.textContent = message;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 8000);
        }

        // ============================================
        // UPDATE UI BASED ON DAY
        // ============================================
        function updateDayUI() {
            const dayInfo = getDayInfo();
            document.getElementById('dayInfo').textContent = `${dayInfo.dayName}, ${dayInfo.date}`;
            
            if (dayInfo.isWeekend) {
                weekendMessage.style.display = 'block';
                checkinBtn.disabled = true;
                checkoutBtn.disabled = true;
            } else {
                weekendMessage.style.display = 'none';
                checkinBtn.disabled = false;
                checkoutBtn.disabled = false;
            }
        }

        // ============================================
        // HANDLE CHECK IN / CHECK OUT
        // ============================================
        async function handleAction(action) {
            const dayInfo = getDayInfo();
            if (dayInfo.isWeekend) {
                showAlert('Check-in/out is only available on weekdays (Monday-Friday)', 'error');
                return;
            }
            
            const employeeId = employeeIdInput.value.trim();
            const pin = pinInput.value.trim();
            
            if (!employeeId) {
                showAlert('Please enter your Staff ID', 'error');
                employeeIdInput.focus();
                return;
            }
            
            if (!pin) {
                showAlert('Please enter your PIN', 'error');
                pinInput.focus();
                return;
            }
            
            const endpoint = action === 'checkin' ? '/api/teacher/checkin' : '/api/teacher/checkout';
            
            try {
                // Disable both buttons while processing
                checkinBtn.disabled = true;
                checkoutBtn.disabled = true;
                checkinBtn.textContent = '⏳ ...';
                checkoutBtn.textContent = '⏳ ...';
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        employeeId: employeeId, 
                        location: 'School',
                        pin: pin 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(result.message, 'success');
                    
                    // Update status card
                    statusCard.style.display = 'block';
                    
                    if (action === 'checkin') {
                        statusText.textContent = result.isLate ? '⚠️ Checked In (LATE)' : '✅ Checked In';
                        statusText.className = result.isLate ? 'status-text late' : 'status-text checked-in';
                        statusTime.textContent = `Time: ${new Date(result.checkInTime).toLocaleTimeString()}`;
                        statusHours.textContent = '';
                    } else {
                        statusText.textContent = '🚪 Checked Out';
                        statusText.className = 'status-text checked-out';
                        statusTime.textContent = `Time: ${new Date(result.checkOutTime).toLocaleTimeString()}`;
                        statusHours.textContent = `Hours Worked: ${result.hoursWorked}`;
                    }
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error: ' + error.message, 'error');
            } finally {
                // Re-enable buttons
                checkinBtn.disabled = false;
                checkoutBtn.disabled = false;
                checkinBtn.textContent = '✅ Check In';
                checkoutBtn.textContent = '🚪 Check Out';
            }
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            updateDayUI();
        });
    </script>
</body>
</html>
