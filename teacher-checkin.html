<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Check-in / Check-out - Changara Star Academy</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍🏫</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 5px;
        }
        .header h1 {
            font-size: 22px;
            color: #0a1628;
            font-weight: 700;
        }
        .header .subtitle {
            color: #888;
            font-size: 13px;
        }
        .kenya-time {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .kenya-time .time {
            font-size: 28px;
            font-weight: 700;
        }
        .kenya-time .date {
            font-size: 14px;
            opacity: 0.8;
        }
        .kenya-time .label {
            font-size: 11px;
            opacity: 0.6;
            display: block;
        }
        .status-card {
            background: #f8f9fc;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #e8ecf1;
        }
        .status-card .status-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .status-card .status-badge.checked-in {
            background: #28a745;
            color: white;
        }
        .status-card .status-badge.checked-out {
            background: #6c757d;
            color: white;
        }
        .status-card .status-badge.absent {
            background: #dc3545;
            color: white;
        }
        .status-card .status-badge.late {
            background: #d4a017;
            color: white;
        }
        .status-card .time-info {
            font-size: 14px;
            color: #555;
        }
        .status-card .time-info strong {
            color: #0a1628;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #d4a017;
            outline: none;
        }
        .form-group input::placeholder {
            color: #aaa;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-checkin {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
        }
        .btn-checkin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }
        .btn-checkin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-checkout {
            background: linear-gradient(135deg, #dc3545, #a71d2a);
            color: white;
        }
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
        }
        .btn-checkout:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #e8ecf1;
            color: #333;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #d5d9e0;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .alert.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert.info {
            display: block;
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }
        .footer-links {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        .footer-links a {
            color: #0a1628;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-links a:hover {
            color: #d4a017;
        }
        .hidden { display: none; }
        .employee-info {
            background: #f8f9fc;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #333;
            border: 1px solid #e8ecf1;
            text-align: center;
        }
        .employee-info strong {
            color: #0a1628;
        }
        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            .header h1 { font-size: 20px; }
            .kenya-time .time { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="icon">👨‍🏫</span>
        <h1>Staff Check-in / Check-out</h1>
        <span class="subtitle">Changara Star Academy</span>
    </div>

    <!-- Kenya Time Display -->
    <div class="kenya-time">
        <span class="label">🔒 Kenya Time</span>
        <div class="time" id="kenyaTime">--:--:--</div>
        <div class="date" id="kenyaDate">Loading...</div>
    </div>

    <!-- Alert Messages -->
    <div id="alert" class="alert"></div>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
        <div class="status-badge absent" id="statusBadge">⚪ Not Checked In</div>
        <div class="time-info" id="statusDetails">
            <span id="statusMessage">Please check in to start your day</span>
        </div>
    </div>

    <!-- Employee Info -->
    <div id="employeeInfo" class="employee-info hidden">
        <strong>👤 Staff:</strong> <span id="displayName">---</span> &nbsp;|&nbsp;
        <strong>🆔 ID:</strong> <span id="displayEmployeeId">---</span>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="form-group">
            <label><i class="fas fa-id-card"></i> Staff ID</label>
            <input type="text" id="employeeId" placeholder="Enter your Staff ID" autocomplete="off">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> PIN</label>
            <input type="password" id="pin" placeholder="Enter your PIN" maxlength="6" autocomplete="off">
        </div>
        <button class="btn btn-checkin" id="checkinBtn" onclick="handleCheckIn()">
            <i class="fas fa-sign-in-alt"></i> Check In
        </button>
        <button class="btn btn-checkout hidden" id="checkoutBtn" onclick="handleCheckOut()">
            <i class="fas fa-sign-out-alt"></i> Check Out
        </button>
    </div>

    <!-- Logout Button -->
    <button class="btn btn-secondary hidden" id="logoutBtn" onclick="logoutUser()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>

    <div class="footer-links">
        <a href="index.html">🏠 Return to Home</a>
    </div>
</div>

<script>
    // ============================================
    // GLOBALS
    // ============================================
    let currentTeacher = null;
    let statusCheckInterval = null;

    // ============================================
    // GET KENYA TIME HELPERS
    // ============================================
    function formatKenyaTime(date) {
        if (!date) return '--:--';
        const d = new Date(date);
        return d.toLocaleTimeString('en-KE', {
            timeZone: 'Africa/Nairobi',
            hour12: true,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    function formatKenyaDate() {
        return new Date().toLocaleDateString('en-KE', {
            timeZone: 'Africa/Nairobi',
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }

    function formatKenyaTimeShort(date) {
        if (!date) return '--:--';
        const d = new Date(date);
        return d.toLocaleTimeString('en-KE', {
            timeZone: 'Africa/Nairobi',
            hour12: true,
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function getCurrentKenyaTime() {
        return new Date().toLocaleTimeString('en-KE', {
            timeZone: 'Africa/Nairobi',
            hour12: true,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    // ============================================
    // UPDATE CLOCK
    // ============================================
    function updateClock() {
        document.getElementById('kenyaTime').textContent = getCurrentKenyaTime();
        document.getElementById('kenyaDate').textContent = formatKenyaDate();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ============================================
    // CHECK CURRENT STATUS
    // ============================================
    async function checkCurrentStatus(employeeId) {
        try {
            const response = await fetch('/api/teacher/attendance/today');
            const data = await response.json();
            
            if (data.success && data.attendance) {
                const teacherRecord = data.attendance.find(t => t.employeeId === employeeId);
                if (teacherRecord) {
                    return teacherRecord;
                }
            }
            return null;
        } catch (error) {
            console.error('Error checking status:', error);
            return null;
        }
    }

    // ============================================
    // UPDATE UI BASED ON STATUS
    // ============================================
    function updateUI(status, teacher) {
        const badge = document.getElementById('statusBadge');
        const details = document.getElementById('statusDetails');

        if (status && status.status === 'Checked In') {
            badge.className = 'status-badge checked-in';
            badge.textContent = '✅ Checked In';
            
            const checkInTime = formatKenyaTime(status.checkIn);
            
            details.innerHTML = `
                <div style="font-size:13px;color:#666;">
                    <strong>✅ Checked In:</strong> ${checkInTime}
                </div>
                <div style="font-size:12px;color:#888;margin-top:4px;">
                    ${status.isLate ? '⚠️ You checked in late' : '✅ On time'}
                </div>
            `;
            
            document.getElementById('checkinBtn').classList.add('hidden');
            document.getElementById('checkoutBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            
        } else if (status && status.status === 'Checked Out') {
            badge.className = 'status-badge checked-out';
            badge.textContent = '✅ Checked Out';
            
            const checkInTime = formatKenyaTime(status.checkIn);
            const checkOutTime = formatKenyaTime(status.checkOut);
            const hoursWorked = status.hoursWorked || '0';
            
            details.innerHTML = `
                <div style="font-size:13px;color:#666;">
                    <strong>✅ Checked In:</strong> ${checkInTime}
                </div>
                <div style="font-size:13px;color:#666;">
                    <strong>✅ Checked Out:</strong> ${checkOutTime}
                </div>
                <div style="font-size:13px;color:#28a745;font-weight:700;margin-top:4px;">
                    ⏱️ Hours Worked: ${hoursWorked} hrs
                </div>
            `;
            
            document.getElementById('checkinBtn').classList.add('hidden');
            document.getElementById('checkoutBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            
        } else {
            badge.className = 'status-badge absent';
            badge.textContent = '⚪ Not Checked In';
            details.innerHTML = `<span style="font-size:14px;color:#888;">Please check in to start your day</span>`;
            document.getElementById('checkinBtn').classList.remove('hidden');
            document.getElementById('checkoutBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
        }

        // Show employee info
        if (teacher) {
            document.getElementById('employeeInfo').classList.remove('hidden');
            document.getElementById('displayName').textContent = teacher.name || teacher.firstName + ' ' + teacher.lastName;
            document.getElementById('displayEmployeeId').textContent = teacher.employeeId;
        }
    }

    // ============================================
    // LOGIN / CHECK IN
    // ============================================
    async function handleCheckIn() {
        const employeeId = document.getElementById('employeeId').value.trim();
        const pin = document.getElementById('pin').value.trim();

        if (!employeeId || !pin) {
            showAlert('Please enter both Staff ID and PIN.', 'error');
            return;
        }

        if (pin.length < 4 || pin.length > 6) {
            showAlert('PIN must be 4-6 digits.', 'error');
            return;
        }

        try {
            const loginResponse = await fetch('/api/teacher/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employeeId, pin })
            });

            const loginData = await loginResponse.json();

            if (loginData.success) {
                currentTeacher = loginData.teacher;
                showAlert('✅ ' + loginData.message, 'success');
                
                const status = await checkCurrentStatus(employeeId);
                if (status) {
                    updateUI(status, currentTeacher);
                }
                
                // Auto-refresh status every 30 seconds
                if (statusCheckInterval) clearInterval(statusCheckInterval);
                statusCheckInterval = setInterval(async () => {
                    const newStatus = await checkCurrentStatus(employeeId);
                    if (newStatus) {
                        updateUI(newStatus, currentTeacher);
                    }
                }, 30000);

            } else {
                showAlert('❌ ' + loginData.message, 'error');
            }
        } catch (error) {
            console.error('Check-in error:', error);
            showAlert('❌ Error: ' + error.message, 'error');
        }
    }

    // ============================================
    // CHECK OUT
    // ============================================
    async function handleCheckOut() {
        const employeeId = document.getElementById('employeeId').value.trim();
        const pin = document.getElementById('pin').value.trim();

        if (!employeeId || !pin) {
            showAlert('Please enter Staff ID and PIN.', 'error');
            return;
        }

        try {
            const response = await fetch('/api/teacher/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employeeId, pin })
            });

            const data = await response.json();

            if (data.success) {
                showAlert('✅ ' + data.message, 'success');
                
                const status = await checkCurrentStatus(employeeId);
                if (status) {
                    updateUI(status, currentTeacher);
                }
                
                if (statusCheckInterval) clearInterval(statusCheckInterval);
                
                setTimeout(() => {
                    showAlert('⏱️ Hours Worked: ' + data.hoursWorked + ' hrs', 'info');
                }, 1000);

            } else {
                showAlert('❌ ' + data.message, 'error');
            }
        } catch (error) {
            console.error('Check-out error:', error);
            showAlert('❌ Error: ' + error.message, 'error');
        }
    }

    // ============================================
    // LOGOUT
    // ============================================
    function logoutUser() {
        currentTeacher = null;
        document.getElementById('employeeId').value = '';
        document.getElementById('pin').value = '';
        document.getElementById('employeeInfo').classList.add('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('checkinBtn').classList.remove('hidden');
        document.getElementById('checkoutBtn').classList.add('hidden');
        
        const badge = document.getElementById('statusBadge');
        badge.className = 'status-badge absent';
        badge.textContent = '⚪ Not Checked In';
        document.getElementById('statusDetails').innerHTML = `<span style="font-size:14px;color:#888;">Please check in to start your day</span>`;
        
        if (statusCheckInterval) clearInterval(statusCheckInterval);
        
        showAlert('👋 Logged out successfully', 'info');
    }

    // ============================================
    // SHOW ALERT
    // ============================================
    function showAlert(message, type) {
        const alertEl = document.getElementById('alert');
        alertEl.className = 'alert ' + type;
        alertEl.textContent = message;
        alertEl.style.display = 'block';
        setTimeout(() => {
            alertEl.style.display = 'none';
        }, 8000);
    }

    // ============================================
    // ENTER KEY SUPPORT
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('employeeId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('pin').focus();
            }
        });
        document.getElementById('pin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('checkinBtn').classList.contains('hidden')) {
                    handleCheckOut();
                } else {
                    handleCheckIn();
                }
            }
        });
    });
</script>
</body>
</html>
